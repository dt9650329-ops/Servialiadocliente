name: Build Signed APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: capacitor-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/servi-aliados-cliente.keystore

      - name: Build release APK
        run: |
          cd android
          echo "Keystore existe en:"
          ls -la app/servi-aliados-cliente.keystore
          echo "Ruta absoluta que se usara:"
          echo "$(pwd)/app/servi-aliados-cliente.keystore"
          ./gradlew --no-daemon assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/servi-aliados-cliente.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: capacitor-app/android/app/build/outputs/apk/release/app-release.apk
