name: Limpiar chats antiguos (>36h)

on:
  schedule:
    # Corre cada 6 horas. Como el borrado es "rodante" (por antigüedad
    # de cada mensaje, no por reloj fijo), no importa que no sea
    # exactamente cada 36h: cualquier intervalo menor a 36h funciona bien.
    - cron: "0 */6 * * *"
  workflow_dispatch: {} # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  limpiar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar firebase-admin
        run: npm install firebase-admin

      - name: Ejecutar limpieza
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node scripts/limpiar-chats-antiguos.js
